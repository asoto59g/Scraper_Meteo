name: LIB07 Daily Dedupe

on:
  schedule:
    - cron: "20 3 * * *"   # diario 03:20 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lib07-daily-dedupe
  cancel-in-progress: false

jobs:
  dedupe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deduplicar históricos (programado_slot + fecha)
        run: python dedupe_history.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add salida_csv/historico || true

          if git diff --cached --quiet; then
            echo "No hay cambios para commitear."
          else
            git commit -m "LIB07 daily dedupe $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
