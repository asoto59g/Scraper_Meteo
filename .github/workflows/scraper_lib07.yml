name: Scrape LIB07 (captura cada 5 min, histórico por fecha)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # false: deja terminar el run anterior antes de iniciar uno nuevo.
  # Evita un push a mitad y dejar el CSV en estado inconsistente.
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.ref }}

      - name: Configurar Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Captura y merge al histórico
        run: python run_guarded_capture.py

      - name: Commit y push si hay cambios (con reintentos)
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -uo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE" || true

          # Solo agregar el directorio de salida
          if [ -d salida_csv ]; then
            git add -A salida_csv/
          fi

          if git diff --cached --quiet; then
            echo "No hay cambios para commitear."
            exit 0
          fi

          git commit -m "LIB07 update $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          BRANCH="${GITHUB_REF_NAME}"
          MAX_RETRIES=3

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Intento $i/$MAX_RETRIES: pull --rebase + push"

            if ! git pull --rebase --autostash origin "$BRANCH"; then
              echo "git pull --rebase falló."
              if [ "$i" -lt "$MAX_RETRIES" ]; then
                SLEEP=$((i * 5))
                echo "Reintentando en ${SLEEP}s..."
                sleep "$SLEEP"
                continue
              else
                echo "Error: pull --rebase falló tras ${MAX_RETRIES} intentos."
                exit 1
              fi
            fi

            if git push origin "HEAD:${BRANCH}"; then
              echo "Push exitoso."
              exit 0
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              SLEEP=$((i * 5))
              echo "Push falló. Reintentando en ${SLEEP}s..."
              sleep "$SLEEP"
            fi
          done

          echo "Error: no se pudo hacer push tras ${MAX_RETRIES} intentos."
          exit 1
