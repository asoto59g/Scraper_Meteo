name: Scrape LIB07 mitigado (runner cada 5 min, slots 15 min)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lib07-scraper
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Captura mitigada por slot (15 min)
        run: python run_guarded_capture.py

      - name: Enviar correo y limpiar históricos (>30 días)
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ vars.EMAIL_TO }}
          DAYS_TO_KEEP: "30"
          MAX_ATTACH_MB: "20"
        run: python cleanup_history.py

      - name: Commit y push si hay cambios (con reintentos)
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add salida_csv || true

          if git diff --cached --quiet; then
            echo "No hay cambios para commitear."
            exit 0
          fi

          git commit -m "LIB07 mitigated update $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          BRANCH="${GITHUB_REF_NAME}"
          MAX_RETRIES=3

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Intento $i/$MAX_RETRIES: pull --rebase + push"
            git pull --rebase origin "$BRANCH"

            if git push origin "HEAD:${BRANCH}"; then
              echo "Push exitoso."
              exit 0
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              SLEEP=$((i * 5))
              echo "Push falló. Reintentando en ${SLEEP}s..."
              sleep "$SLEEP"
            fi
          done

          echo "Error: no se pudo hacer push tras ${MAX_RETRIES} intentos."
          exit 1
